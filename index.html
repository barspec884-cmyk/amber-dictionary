<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber Palette Dictionary</title>
    <style>
        :root {
            --amber-dark: #1a120b; --amber-mid: #2c1e17; --amber-gold: #d4a373;
            --amber-bright: #faedcd; --text-main: #fefae0;
            --color-tasting: #d4a373; --color-distillation: #cd7f32;
            --color-maturation: #8b4513; --color-raw: #e9c46a;
        }
        body { background-color: var(--amber-dark); color: var(--text-main); font-family: sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: var(--amber-gold); font-size: 1.5em; margin-bottom: 20px; }

        /* ===== 検索窓 + サジェスト ===== */
        .search-wrapper { position: relative; margin-bottom: 20px; }
        .search-box {
            width: 100%; padding: 14px 48px 14px 20px; border-radius: 25px;
            border: 2px solid var(--amber-gold); background: var(--amber-mid);
            color: white; font-size: 1.1em; box-sizing: border-box; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            border-color: #e8b878;
            box-shadow: 0 0 12px rgba(212, 163, 115, 0.35);
        }
        .search-box::placeholder { color: rgba(250, 237, 205, 0.45); }

        /* 検索アイコン */
        .search-icon {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--amber-gold); opacity: 0.7; pointer-events: none; font-size: 1.2em;
        }

        /* クリアボタン */
        .search-clear {
            position: absolute; right: 44px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--amber-gold); font-size: 1.3em;
            cursor: pointer; display: none; padding: 4px 8px; opacity: 0.7;
            transition: opacity 0.15s;
        }
        .search-clear:hover { opacity: 1; }
        .search-clear.visible { display: block; }

        /* ===== サジェストドロップダウン ===== */
        .suggest-dropdown {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--amber-mid); border: 1.5px solid var(--amber-gold);
            border-radius: 12px; max-height: 360px; overflow-y: auto;
            z-index: 100; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .suggest-dropdown.open { display: block; }

        .suggest-section-label {
            padding: 10px 16px 4px; font-size: 0.75em; letter-spacing: 0.08em;
            color: var(--amber-gold); opacity: 0.7; text-transform: uppercase; font-weight: bold;
        }

        .suggest-item {
            padding: 12px 16px; cursor: pointer; display: flex; align-items: center;
            gap: 12px; border-bottom: 1px solid rgba(212,163,115,0.08);
            transition: background 0.12s;
        }
        .suggest-item:last-child { border-bottom: none; }
        .suggest-item:hover, .suggest-item.active {
            background: rgba(212, 163, 115, 0.15);
        }

        .suggest-badge {
            font-size: 0.7em; padding: 2px 8px; border-radius: 10px;
            background: rgba(212,163,115,0.2); color: var(--amber-gold);
            white-space: nowrap; flex-shrink: 0;
        }
        .suggest-main { flex: 1; min-width: 0; }
        .suggest-term { font-weight: bold; color: var(--amber-bright); font-size: 0.95em; }
        .suggest-sub { font-size: 0.8em; color: #aaa; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .suggest-match { background: rgba(212,163,115,0.4); border-radius: 2px; color: #fff; }

        .suggest-footer {
            padding: 8px 16px; text-align: center; font-size: 0.8em;
            color: rgba(250,237,205,0.4); border-top: 1px solid rgba(212,163,115,0.15);
        }

        /* ===== インデックス（展開時）のボタングリッド ===== */
        .index-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .btn-index { background: var(--amber-mid); color: var(--amber-bright); border: 1px solid var(--amber-gold); padding: 8px 10px; border-radius: 4px; font-size: 0.9em; cursor: pointer; min-width: 42px; }
        .btn-index:hover, .btn-index.active { background: var(--amber-gold); color: black; }

        /* ===== アコーディオン構造 ===== */
        .tag-index-container, .nav-section { margin: 0 0 10px 0; }
        .main-category-root { border: 1.5px solid var(--amber-gold); border-radius: 8px; background: var(--amber-mid); overflow: hidden; margin-bottom: 10px; }
        .btn-root-label { width: 100%; padding: 14px 15px; background: var(--amber-mid); color: var(--amber-gold); border: none; font-size: 1.05em; font-weight: bold; display: flex; align-items: center; cursor: pointer; }

        .tag-group { border-top: 1px solid rgba(212, 163, 115, 0.2); }
        .tag-group-label { width: 100%; padding: 12px 15px 12px 25px; font-size: 0.95em; color: var(--amber-bright); background: rgba(255,255,255,0.03); border: none; display: flex; align-items: center; cursor: pointer; }
        .tag-sub-group { border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-tag-expand { width: 100%; padding: 10px 15px 10px 40px; font-size: 0.9em; color: #ccc; background: none; border: none; display: flex; align-items: center; cursor: pointer; }

        .cat-name, .tag-name, .root-name { margin-right: auto; }
        .count-num { font-size: 0.85em; opacity: 0.7; margin-right: 10px; font-weight: normal; }

        .tag-group-label::after, .btn-tag-expand::after, .btn-root-label::after { content: '▶'; font-size: 0.75em; transition: transform 0.2s; color: var(--amber-gold); }
        .open > .tag-group-label::after, .open > .btn-tag-expand::after, .open > .btn-root-label::after { transform: rotate(90deg); }

        .tag-group-container, .tag-sub-container { display: none; }
        .tag-term-list { display: none; padding: 5px 15px 12px 55px; background: rgba(0,0,0,0.2); }
        .open > .tag-term-list { display: block; }

        .term-link { display: block; color: var(--amber-gold); font-size: 0.9em; padding: 10px 0; text-decoration: none; opacity: 1; line-height: 1.4; border-bottom: 1px solid rgba(212, 163, 115, 0.1); }
        .term-link:last-child { border-bottom: none; }

        /* ===== 辞書カード ===== */
        .dictionary-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .dic-card { background: var(--amber-mid); padding: 18px; border-radius: 8px; border-top: 4px solid var(--amber-gold); }
        .term-en { font-weight: bold; font-size: 1.2em; color: var(--amber-gold); }
        .term-jp { font-size: 0.9em; opacity: 0.8; margin-top: 2px; }
        .desc { font-size: 0.95em; color: #ddd; margin: 12px 0; line-height: 1.5; }
        .card-tag { color: var(--amber-gold); font-size: 0.85em; margin-right: 12px; cursor: pointer; text-decoration: underline; }
        .highlight { background: rgba(212, 163, 115, 0.4); border-radius: 2px; }

        /* ===== ステータスバー ===== */
        .status-bar { background: rgba(212, 163, 115, 0.2); border-left: 5px solid var(--amber-gold); padding: 12px 15px; margin: 10px 0 20px 0; display: none; justify-content: space-between; align-items: center; border-radius: 4px; }
        .status-bar.show { display: flex; }

        /* ===== キーボードヒント（PCのみ） ===== */
        .keyboard-hint {
            display: none; text-align: center; font-size: 0.75em;
            color: rgba(250,237,205,0.3); margin-top: -14px; margin-bottom: 14px;
        }
        @media (hover: hover) and (pointer: fine) {
            .keyboard-hint { display: block; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Amber Palette Dictionary</h1>

    <div class="search-wrapper">
        <input type="text" id="dicSearch" class="search-box" placeholder="単語・説明・タグから逆引き検索..." autocomplete="off">
        <button class="search-clear" id="searchClear" onclick="resetSearch()" title="検索をクリア">×</button>
        <span class="search-icon">🔍</span>
        <div class="suggest-dropdown" id="suggestDropdown"></div>
    </div>
    <div class="keyboard-hint">↑↓ で選択 ・ Enter で確定 ・ Esc で閉じる</div>

    <div class="nav-section">
        <div id="alphaIndex"></div>
        <div id="kanaIndex"></div>
    </div>

    <div id="tagHierarchicalIndex" class="tag-index-container"></div>

    <div id="resultStatus" class="status-bar">
        <span id="statusMessage" style="font-weight: bold;"></span>
        <button onclick="resetSearch()" style="background:var(--amber-gold); border:none; padding:4px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">解除</button>
    </div>

    <div id="dictionaryList" class="dictionary-grid"></div>
</div>

<script>
    let masterData = [];
    let suggestActiveIndex = -1;

    const categoryNames = {
        "tasting": "テイスティング表現", "distillation": "蒸留・設備", "maturation": "熟成・樽",
        "fermentation": "発酵・微生物", "raw": "原料・製麦", "finishing": "仕上げ・瓶詰め",
        "distribution": "流通・スタイル", "others": "その他"
    };

    const kanaRows = {
        "あ": "あいうえおぁぃぅぇぉ", "か": "かきくけこがぎぐげご", "さ": "さしすせそざじずぜぞ",
        "た": "たちつてとだぢづでど", "な": "なにぬねの", "は": "はひふへほばびぶべぼぱぴぷぺぽ",
        "ま": "まみむめも", "や": "やゆよゃゅょ", "ら": "らりるれろ", "わ": "わをん"
    };

    function init() {
        fetch('dictionary-data.json')
            .then(response => {
                if (!response.ok) throw new Error('読み込み失敗');
                return response.json();
            })
            .then(data => {
                masterData = data;
                createIndexNav();
                createTagAccordion();
                renderDictionary(masterData);
            })
            .catch(err => {
                document.getElementById('dictionaryList').innerHTML =
                    "<div style='text-align:center; padding:20px;'>dictionary-data.json を読み込めません。<br><small>" + err.message + "</small></div>";
            });
    }

    // ===== サジェスト機能 =====
    function buildSuggestions(query) {
        if (!query || query.length < 1) return [];
        const q = query.toLowerCase();
        const results = [];

        // 1) 用語名（英語・日本語）の前方一致 → 優先度高
        masterData.forEach(item => {
            const enMatch = item.term_en.toLowerCase().startsWith(q);
            const jpMatch = item.term_jp.startsWith(query);
            if (enMatch || jpMatch) {
                results.push({ item, type: 'term', matchField: enMatch ? 'en' : 'jp', priority: 1 });
            }
        });

        // 2) 用語名の部分一致（前方一致で見つかったものは除外）
        const foundIds = new Set(results.map(r => r.item.id));
        masterData.forEach(item => {
            if (foundIds.has(item.id)) return;
            const enMatch = item.term_en.toLowerCase().includes(q);
            const jpMatch = item.term_jp.includes(query);
            if (enMatch || jpMatch) {
                results.push({ item, type: 'term', matchField: enMatch ? 'en' : 'jp', priority: 2 });
                foundIds.add(item.id);
            }
        });

        // 3) 説明文の部分一致
        masterData.forEach(item => {
            if (foundIds.has(item.id)) return;
            if (item.description.toLowerCase().includes(q)) {
                results.push({ item, type: 'desc', matchField: 'desc', priority: 3 });
                foundIds.add(item.id);
            }
        });

        // 4) タグの一致
        masterData.forEach(item => {
            if (foundIds.has(item.id)) return;
            const tagMatch = item.tags.some(t => t.toLowerCase().includes(q));
            if (tagMatch) {
                results.push({ item, type: 'tag', matchField: 'tag', priority: 4 });
                foundIds.add(item.id);
            }
        });

        // 優先度でソート
        results.sort((a, b) => a.priority - b.priority);
        return results.slice(0, 8); // 最大8件
    }

    function highlightMatch(text, query) {
        if (!query) return text;
        const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(re, '<span class="suggest-match">$1</span>');
    }

    function renderSuggestions(query) {
        const dropdown = document.getElementById('suggestDropdown');
        const results = buildSuggestions(query);
        suggestActiveIndex = -1;

        if (results.length === 0) {
            dropdown.classList.remove('open');
            return;
        }

        const badgeLabels = { term: '用語', desc: '説明', tag: 'タグ' };

        let html = '<div class="suggest-section-label">候補</div>';
        results.forEach((r, i) => {
            const item = r.item;
            const badge = badgeLabels[r.type] || '';
            const termDisplay = highlightMatch(item.term_en, query);
            const sub = r.type === 'desc'
                ? truncateAround(item.description, query, 40)
                : item.term_jp;

            html += `
                <div class="suggest-item" data-index="${i}"
                     onmouseenter="setSuggestActive(${i})"
                     onclick="selectSuggestion(${i})">
                    <span class="suggest-badge">${badge}</span>
                    <div class="suggest-main">
                        <div class="suggest-term">${termDisplay}</div>
                        <div class="suggest-sub">${highlightMatch(sub, query)}</div>
                    </div>
                </div>
            `;
        });

        html += `<div class="suggest-footer">Enter で選択 ・ 全${masterData.filter(item => {
            const q = query.toLowerCase();
            return item.term_en.toLowerCase().includes(q) || item.term_jp.includes(query)
                || item.description.toLowerCase().includes(q)
                || item.tags.some(t => t.toLowerCase().includes(q));
        }).length}件ヒット</div>`;

        dropdown.innerHTML = html;
        dropdown.classList.add('open');

        // サジェスト結果をグローバルに保持
        dropdown._results = results;
    }

    function truncateAround(text, query, radius) {
        const q = query.toLowerCase();
        const idx = text.toLowerCase().indexOf(q);
        if (idx === -1) return text.substring(0, radius * 2) + '…';
        const start = Math.max(0, idx - radius);
        const end = Math.min(text.length, idx + query.length + radius);
        let slice = text.substring(start, end);
        if (start > 0) slice = '…' + slice;
        if (end < text.length) slice = slice + '…';
        return slice;
    }

    function setSuggestActive(index) {
        suggestActiveIndex = index;
        const items = document.querySelectorAll('.suggest-item');
        items.forEach((el, i) => el.classList.toggle('active', i === index));
    }

    function selectSuggestion(index) {
        const dropdown = document.getElementById('suggestDropdown');
        const results = dropdown._results;
        if (!results || !results[index]) return;

        const item = results[index].item;
        const searchBox = document.getElementById('dicSearch');
        searchBox.value = item.term_en;
        dropdown.classList.remove('open');

        // その単語のカードだけ表示
        const filtered = masterData.filter(d => d.id === item.id);
        renderDictionary(filtered, item.term_en);
        finalizeFilter(`「${item.term_en}」の詳細`);
    }

    // ===== 検索窓イベント =====
    const searchBox = document.getElementById('dicSearch');
    const clearBtn = document.getElementById('searchClear');

    searchBox.addEventListener('input', (e) => {
        const q = e.target.value;
        clearBtn.classList.toggle('visible', q.length > 0);

        // アコーディオンを閉じる
        ['root-alpha-index', 'root-kana-index', 'root-category-list'].forEach(id => {
            const el = document.getElementById(id);
            if (el && el.classList.contains('open')) toggleAccordion(id);
        });

        if (q === "") {
            document.getElementById('resultStatus').classList.remove('show');
            document.getElementById('suggestDropdown').classList.remove('open');
            renderDictionary(masterData);
        } else {
            // サジェスト表示
            renderSuggestions(q);

            // 下のカード一覧もリアルタイム絞り込み
            const ql = q.toLowerCase();
            const filtered = masterData.filter(item =>
                item.term_en.toLowerCase().includes(ql) || item.term_jp.includes(q) ||
                (item.reading && item.reading.includes(q)) || item.description.includes(q) ||
                item.tags.some(t => t.toLowerCase().includes(ql))
            );
            renderDictionary(filtered, q);
            document.getElementById('resultStatus').classList.add('show');
            document.getElementById('statusMessage').innerText = `「${q}」の検索結果: ${filtered.length}件`;
        }
    });

    // キーボードナビゲーション
    searchBox.addEventListener('keydown', (e) => {
        const dropdown = document.getElementById('suggestDropdown');
        if (!dropdown.classList.contains('open')) return;

        const items = dropdown.querySelectorAll('.suggest-item');
        const maxIndex = items.length - 1;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            suggestActiveIndex = Math.min(suggestActiveIndex + 1, maxIndex);
            setSuggestActive(suggestActiveIndex);
            items[suggestActiveIndex]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            suggestActiveIndex = Math.max(suggestActiveIndex - 1, 0);
            setSuggestActive(suggestActiveIndex);
            items[suggestActiveIndex]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (suggestActiveIndex >= 0) {
                selectSuggestion(suggestActiveIndex);
            } else {
                dropdown.classList.remove('open');
            }
        } else if (e.key === 'Escape') {
            dropdown.classList.remove('open');
        }
    });

    // ドロップダウン外クリックで閉じる
    document.addEventListener('click', (e) => {
        const wrapper = document.querySelector('.search-wrapper');
        if (!wrapper.contains(e.target)) {
            document.getElementById('suggestDropdown').classList.remove('open');
        }
    });

    // ===== 既存機能（変更なし） =====
    function createIndexNav() {
        const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const kana = "あかさたなはまやらわ".split("");

        const makeIndexHtml = (id, label, items, mode) => `
            <div class="main-category-root" id="${id}">
                <button class="btn-root-label" onclick="toggleAccordion('${id}')">
                    <span class="root-name">${label}</span>
                    <span class="count-num">${items.length} Keys</span>
                </button>
                <div class="tag-group-container" style="padding: 10px;">
                    <div class="index-row">
                        ${items.map(c => `<button class="btn-index" onclick="filterByChar(event, '${c}', '${mode}')">${c}</button>`).join('')}
                    </div>
                </div>
            </div>
        `;

        document.getElementById('alphaIndex').innerHTML = makeIndexHtml('root-alpha-index', 'Alphabet Index', alpha, 'en');
        document.getElementById('kanaIndex').innerHTML = makeIndexHtml('root-kana-index', 'Hiragana Index', kana, 'jp');
    }

    function createTagAccordion() {
        const container = document.getElementById('tagHierarchicalIndex');
        if(!container) return;

        const structuredData = {};
        masterData.forEach(item => {
            if (!structuredData[item.category]) structuredData[item.category] = {};
            item.tags.forEach(tag => {
                if (!tag) return;
                if (!structuredData[item.category][tag]) structuredData[item.category][tag] = [];
                structuredData[item.category][tag].push(item);
            });
        });

        let html = `
            <div class="main-category-root" id="root-category-list">
                <button class="btn-root-label" onclick="toggleAccordion('root-category-list')">
                    <span class="root-name">カテゴリーから探す</span>
                    <span class="count-num">${Object.keys(structuredData).length} Categories</span>
                </button>
                <div class="tag-group-container">
        `;

        html += Object.keys(structuredData).sort().map(cat => {
            const tags = structuredData[cat];
            const categoryId = `group-${cat}`.replace(/\s+/g, '-');
            return `
                <div class="tag-group" id="${categoryId}">
                    <button class="tag-group-label" onclick="toggleAccordion('${categoryId}')">
                        <span class="cat-name">${categoryNames[cat] || cat}</span>
                        <span class="count-num">${Object.keys(tags).length} Tags</span>
                    </button>
                    <div class="tag-sub-container">
                        ${Object.keys(tags).sort().map(tagName => {
                            const items = tags[tagName];
                            const subGroupId = `sub-${cat}-${tagName}`.replace(/\s+/g, '-');
                            return `
                                <div class="tag-sub-group" id="${subGroupId}">
                                    <button class="btn-tag-expand" onclick="toggleAccordion('${subGroupId}')">
                                        <span class="tag-name">#${tagName}</span>
                                        <span class="count-num">${items.length}</span>
                                    </button>
                                    <div class="tag-term-list">
                                        ${items.map(item => `
                                            <a href="javascript:void(0)" class="term-link" onclick="filterBySingleWord('${item.term_en}')">
                                                ・${item.term_en}
                                            </a>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }).join('');

        html += `</div></div>`;
        container.innerHTML = html;
    }

    function toggleAccordion(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle('open');
        const content = el.querySelector('.tag-group-container, .tag-sub-container, .tag-term-list');
        if (content) {
            content.style.display = (content.style.display === 'none' || content.style.display === '') ? 'block' : 'none';
        }
    }

    function filterByChar(event, char, mode) {
        clearActiveStates();
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
        const filtered = masterData.filter(item => {
            if (mode === 'en') return item.term_en.toUpperCase().startsWith(char.toUpperCase());
            const rowChars = kanaRows[char] || char;
            const target = item.reading || item.term_jp || "";
            return rowChars.includes(toHiragana(target.charAt(0)));
        });
        renderDictionary(filtered);
        finalizeFilter(`「${char}」行の結果: ${filtered.length}件`);
        const targetId = (mode === 'en') ? 'root-alpha-index' : 'root-kana-index';
        toggleAccordion(targetId);
    }

    function filterBySingleWord(wordEn) {
        const filtered = masterData.filter(item => item.term_en === wordEn);
        renderDictionary(filtered, wordEn);
        finalizeFilter(`「${wordEn}」の詳細`);
        const rootId = 'root-category-list';
        const rootEl = document.getElementById(rootId);
        if (rootEl && rootEl.classList.contains('open')) toggleAccordion(rootId);
    }

    function filterByTag(tag) {
        const filtered = masterData.filter(item => item.tags.includes(tag));
        renderDictionary(filtered, tag);
        finalizeFilter(`タグ「#${tag}」の結果: ${filtered.length}件`);
    }

    function renderDictionary(data, query = "") {
        const list = document.getElementById('dictionaryList');
        if (data.length === 0) {
            list.innerHTML = "<div style='text-align:center; padding:40px; opacity:0.6;'>該当なし</div>";
            return;
        }
        list.innerHTML = data.map(item => `
            <div class="dic-card" data-cat="${item.category}">
                <div class="term-en">${highlight(item.term_en, query)}</div>
                <div class="term-jp">${item.term_jp}</div>
                <p class="desc">${highlight(item.description, query)}</p>
                <div class="card-tags">
                    ${item.tags.map(tag => `<span class="card-tag" onclick="filterByTag('${tag}')">#${tag}</span>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function highlight(text, q) {
        if (!q || q.length < 1) return text;
        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "gi");
        return text.replace(re, `<span class="highlight">$1</span>`);
    }

    function clearActiveStates() {
        document.querySelectorAll('.btn-index').forEach(el => el.classList.remove('active'));
    }

    function finalizeFilter(message) {
        const status = document.getElementById('resultStatus');
        const msg = document.getElementById('statusMessage');
        status.classList.add('show');
        msg.innerText = message;
        window.scrollTo({ top: status.offsetTop - 20, behavior: 'smooth' });
    }

    function resetSearch() {
        clearActiveStates();
        document.getElementById('resultStatus').classList.remove('show');
        document.getElementById('dicSearch').value = "";
        document.getElementById('suggestDropdown').classList.remove('open');
        clearBtn.classList.remove('visible');
        renderDictionary(masterData);
    }

    function toHiragana(src) {
        return src.replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
    }

    window.onload = init;
</script>
</body>
</html>
